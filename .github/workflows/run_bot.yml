name: Haber Botu Otomatik Calistir

on:
  schedule:
    - cron: '0 8 * * *' # Her gün Türkiye saatiyle 11:00 (UTC 08:00)
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyairtable python-dotenv

      - name: Botu Calistir
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }} # GitHub Secrets'tan alır
        run: python bot.py
